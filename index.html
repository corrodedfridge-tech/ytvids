  window.scrollTo(0,0);

}

function uDB(){var v=fV(cV);document.getElementById('dBt').style.display=(v&&U&&v.uid===U.uid)?'flex':'none'}

// ══════ COMMENTS ══════

// ══════ LIKES (real-time) ══════
function doLk(){
  if(!U){toast('Sign in to like');return}if(!cV)return;

    // Like
    ref.set({t:firebase.firestore.FieldValue.serverTimestamp()}).then(function(){return db.collection('videos').doc(cV).update({likes:firebase.firestore.FieldValue.increment(1)})}).catch(function(e){toast('Error: '+e.message)});
  }
  // No toast here - the UI updates via real-time listener
}

// ══════ UPLOAD ══════
function oUp(){if(!U){toast('Sign in first');doSI();return}document.getElementById('uMd').classList.add('show');rUp()}
function cUp(){document.getElementById('uMd').classList.remove('show');rUp()}
function rUp(){document.getElementById('uE').style.display='none';document.getElementById('uO').style.display='none';['uUrl','uTh','uTi','uDe','uDu'].forEach(function(i){document.getElementById(i).value=''});document.getElementById('tCt').textContent='0 / 200';document.getElementById('dCt').textContent='0 / 5,000';clF();sTab('f');document.getElementById('sBtn').disabled=false;document.getElementById('sBtn').innerHTML='Upload';aT=null}
function sTab(t){uT=t;var tabs=document.querySelectorAll('.utab');tabs[0].classList.toggle('ac',t==='f');tabs[1].classList.toggle('ac',t==='u');document.getElementById('fTC').style.display=t==='f'?'block':'none';document.getElementById('uTC').style.display=t==='u'?'block':'none'}
function uCt(el,id,mx){document.getElementById(id).textContent=el.value.length.toLocaleString()+' / '+mx.toLocaleString()}

var dz=document.getElementById('dZ');
dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('ov')});
dz.addEventListener('dragleave',function(){dz.classList.remove('ov')});
dz.addEventListener('drop',function(e){e.preventDefault();dz.classList.remove('ov');if(e.dataTransfer.files.length)prc(e.dataTransfer.files[0])});
function hF(e){if(e.target.files.length)prc(e.target.files[0])}

function prc(file){
  var er=document.getElementById('uE');er.style.display='none';
  if(!file.type.startsWith('video/')){er.textContent='Please select a video file';er.style.display='block';return}
  pF=file;document.getElementById('dZ').style.display='none';document.getElementById('fIn').classList.add('show');
  document.getElementById('fNm').textContent=file.name;var ch=Math.ceil(file.size*1.37/CK);
  document.getElementById('fSz').textContent=fB(file.size)+(ch>1?' · '+ch+' chunks':'');
  var hp=document.getElementById('hP');hp.src=URL.createObjectURL(file);
  var ti=document.getElementById('uTi');if(!ti.value){ti.value=file.name.replace(/\.[^/.]+$/,'').replace(/[_\-\.]+/g,' ').replace(/\s+/g,' ').trim();uCt(ti,'tCt',200)}
  hp.addEventListener('loadedmetadata',function(){var d=hp.duration;if(d&&isFinite(d)){var h=Math.floor(d/3600),m=Math.floor((d%3600)/60),s=Math.floor(d%60);document.getElementById('uDu').value=h>0?h+':'+pad(m)+':'+pad(s):m+':'+pad(s)}},{once:true});
  bestThumb(file).then(function(t){if(t){aT=t;document.getElementById('tI').src=t;document.getElementById('tP').classList.add('show')}});
  var pg=document.getElementById('rP');pg.classList.add('show');document.getElementById('rT').textContent='Reading...';document.getElementById('rF').style.width='0%';
  var r=new FileReader();
  r.onprogress=function(e){if(e.lengthComputable){var p=Math.round(e.loaded/e.total*100);document.getElementById('rF').style.width=p+'%';document.getElementById('rT').textContent='Reading... '+p+'%'}};
  r.onload=function(){pB=r.result;document.getElementById('rF').style.width='100%';document.getElementById('rT').textContent='✓ Ready · '+fB(file.size);var raw=gR(pB);var nc=Math.ceil(raw.length/CK);document.getElementById('rD').textContent=nc+' chunk'+(nc>1?'s':'')};
  r.onerror=function(){er.textContent='Failed to read';er.style.display='block';clF()};
  r.readAsDataURL(file);
}
function gR(d){return d.indexOf('data:')===0?d.substring(d.indexOf(',')+1):d}
function gM(d){if(d.indexOf('data:')===0){var m=d.match(/data:([^;]+)/);if(m)return m[1]}return'video/mp4'}
function pad(n){return n<10?'0'+n:''+n}
function clF(){pF=null;pB=null;aT=null;document.getElementById('dZ').style.display='block';document.getElementById('fIn').classList.remove('show');document.getElementById('tP').classList.remove('show');document.getElementById('rP').classList.remove('show');document.getElementById('fI').value='';document.getElementById('rD').textContent=''}

function doUp(){
  if(!U){toast('Sign in');return}var er=document.getElementById('uE'),ok=document.getElementById('uO'),bt=document.getElementById('sBtn');
  er.style.display='none';ok.style.display='none';
  var ti=document.getElementById('uTi').value.trim(),de=document.getElementById('uDe').value.trim(),du=document.getElementById('uDu').value.trim();
  if(!ti){er.textContent='Title required';er.style.display='block';return}
  bt.disabled=true;bt.innerHTML='<span class="sp d"></span> Uploading...';
  var p;
  if(uT==='f'){if(!pB){er.textContent='Select a file';er.style.display='block';bt.disabled=false;bt.innerHTML='Upload';return}p=upCh(ti,de,du)}
  else{var url=document.getElementById('uUrl').value.trim(),th=document.getElementById('uTh').value.trim();if(!url){er.textContent='Enter URL';er.style.display='block';bt.disabled=false;bt.innerHTML='Upload';return}try{new URL(url)}catch(e){er.textContent='Invalid URL';er.style.display='block';bt.disabled=false;bt.innerHTML='Upload';return}p=upUrl(ti,de,du,url,th)}
  p.then(function(){ok.textContent='✓ Uploaded!';ok.style.display='block';toast('Uploaded! 🎉');setTimeout(cUp,1200)}).catch(function(e){er.textContent='Failed: '+e.message;er.style.display='block'}).finally(function(){bt.disabled=false;bt.innerHTML='Upload'});
}
function upUrl(ti,de,du,url,th){var tp=th?Promise.resolve(th):bestThumb(url);return tp.then(function(t){return db.collection('videos').add({title:ti,url:url,thumbnail:t||'',channel:U.displayName||'Anonymous',description:de,duration:du,uid:U.uid,userDisplayName:U.displayName||'Anonymous',userPhotoURL:U.photoURL||'',views:0,likes:0,chunked:false,totalChunks:0,mimeType:'video/mp4',createdAt:firebase.firestore.FieldValue.serverTimestamp()})})}
function upCh(ti,de,du){
  var raw=gR(pB),mime=gM(pB),tc=Math.ceil(raw.length/CK),thumb=aT||'';
  var pg=document.getElementById('rP');pg.classList.add('show');document.getElementById('rT').textContent='Creating...';document.getElementById('rF').style.width='0%';
  return db.collection('videos').add({title:ti,url:'',thumbnail:thumb,channel:U.displayName||'Anonymous',description:de,duration:du,uid:U.uid,userDisplayName:U.displayName||'Anonymous',userPhotoURL:U.photoURL||'',views:0,likes:0,chunked:true,totalChunks:tc,mimeType:mime,createdAt:firebase.firestore.FieldValue.serverTimestamp()}).then(function(ref){
    var go=function(i){if(i>=tc){document.getElementById('rT').textContent='✓ Complete!';document.getElementById('rF').style.width='100%';return Promise.resolve()}var s=i*CK,e=Math.min(s+CK,raw.length);document.getElementById('rT').textContent='Chunk '+(i+1)+'/'+tc;document.getElementById('rF').style.width=Math.round((i+1)/tc*100)+'%';document.getElementById('rD').textContent=fB(e*.75)+' / '+fB(raw.length*.75);return db.collection('videos').doc(ref.id).collection('chunks').doc(String(i).padStart(6,'0')).set({index:i,data:raw.substring(s,e)}).then(function(){return go(i+1)})};return go(0);
  });
}

// ══════ DELETE ══════
function dCur(){var v=fV(cV);if(!v||!U||v.uid!==U.uid)return;if(!confirm('Delete "'+v.title+'"?'))return;delD(cV,v.chunked).then(function(){toast('Deleted');goHome()}).catch(function(e){toast('Failed: '+e.message)})}
function rmV(id){if(!U)return;var v=fV(id);if(!v||v.uid!==U.uid)return;if(!confirm('Delete "'+v.title+'"?'))return;delD(id,v.chunked).then(function(){toast('Deleted')}).catch(function(e){toast('Failed: '+e.message)})}
function delD(id,ch){
  var p=ch?db.collection('videos').doc(id).collection('chunks').get().then(function(s){var b=db.batch();s.forEach(function(d){b.delete(d.ref)});return b.commit()}):Promise.resolve();
  return p.then(function(){return db.collection('videos').doc(id).collection('comments').get()}).then(function(s){if(s&&!s.empty){var b=db.batch();s.forEach(function(d){b.delete(d.ref)});return b.commit()}}).then(function(){return db.collection('videos').doc(id).delete()}).then(function(){if(bc[id]){URL.revokeObjectURL(bc[id]);delete bc[id]}});
}

// ══════ SEARCH / MY VIDEOS ══════
function srch(){var q=document.getElementById('sI').value.toLowerCase().trim();if(!q){goHome();return}if(wt){document.getElementById('hV').style.display='block';document.getElementById('wV').classList.remove('ac');wt=false;document.getElementById('pl').pause();unsubWatch()}var f=[];for(var i=0;i<V.length;i++){var v=V[i];if(v.title.toLowerCase().indexOf(q)!==-1||v.ch.toLowerCase().indexOf(q)!==-1||v.desc.toLowerCase().indexOf(q)!==-1)f.push(v)}var g=document.getElementById('vG');if(!f.length)g.innerHTML='<div class="ept"><h3>No results</h3></div>';else{var h='';for(var j=0;j<f.length;j++)h+=cHTML(f[j]);g.innerHTML=h}document.querySelectorAll('.chp').forEach(function(c){c.classList.remove('ac')})}
function myV(){if(!U){toast('Sign in first');return}if(wt)goHome();var m=[];for(var i=0;i<V.length;i++){if(V[i].uid===U.uid)m.push(V[i])}var g=document.getElementById('vG');if(!m.length)g.innerHTML='<div class="ept"><h3>No videos yet</h3><button onclick="oUp()">Upload</button></div>';else{var h='';for(var j=0;j<m.length;j++)h+=cHTML(m[j]);g.innerHTML=h}document.querySelectorAll('.chp').forEach(function(c){c.classList.remove('ac')})}

// ══════ UI ══════
function doSh(){if(navigator.clipboard)navigator.clipboard.writeText(location.href).then(function(){toast('Link copied')})}
function tDe(){var b=document.getElementById('dB'),t=document.getElementById('dTg');b.classList.toggle('ex');t.textContent=b.classList.contains('ex')?'Show less':'Show more'}
function tSB(){so=!so;document.getElementById('sB').classList.toggle('hid',!so);document.getElementById('mainEl').classList.toggle('f',!so)}

document.querySelectorAll('.chp').forEach(function(c){c.addEventListener('click',function(){document.querySelectorAll('.chp').forEach(function(x){x.classList.remove('ac')});c.classList.add('ac');rG(c.dataset.f)})});
document.getElementById('uMd').addEventListener('click',function(e){if(e.target===document.getElementById('uMd'))cUp()});
document.getElementById('pl').addEventListener('ended',function(){if(cV)saveProg(cV,0,0);if(cV&&V.length>1){var idx=-1;for(var i=0;i<V.length;i++){if(V[i].id===cV){idx=i;break}}oW(V[(idx+1)%V.length].id)}});
document.getElementById('pl').addEventListener('pause',function(){if(cV){var p=document.getElementById('pl');if(p.duration)saveProg(cV,p.currentTime,p.duration)}});
function onR(){if(window.innerWidth<=900){document.getElementById('sB').classList.add('hid');document.getElementById('mainEl').classList.add('f');so=false}}
window.addEventListener('resize',onR);onR();

function fV(id){for(var i=0;i<V.length;i++){if(V[i].id===id)return V[i]}return null}
function fN(n){if(n>=1e6)return(n/1e6).toFixed(1).replace(/\.0$/,'')+'M';if(n>=1e3)return(n/1e3).toFixed(1).replace(/\.0$/,'')+'K';return''+n}
function fB(b){if(b>=1e9)return(b/1e9).toFixed(1)+' GB';if(b>=1e6)return(b/1e6).toFixed(1)+' MB';if(b>=1e3)return(b/1e3).toFixed(1)+' KB';return b+' B'}
function fmtT(s){var m=Math.floor(s/60),sec=Math.floor(s%60);return m+':'+(sec<10?'0':'')+sec}
function ago(d){var s=Math.floor((Date.now()-d)/1e3);if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+' min ago';if(s<86400)return Math.floor(s/3600)+' hours ago';if(s<2592e3)return Math.floor(s/86400)+' days ago';if(s<31536e3)return Math.floor(s/2592e3)+' months ago';return Math.floor(s/31536e3)+' years ago'}
function toast(m){var t=document.getElementById('tst');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show')},3000)}

subDB();
