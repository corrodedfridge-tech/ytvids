<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>youtuben't</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Roboto',Arial,sans-serif;background:#0f0f0f;color:#fff;overflow-x:hidden}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#555;border-radius:4px}

.hdr{position:fixed;top:0;left:0;right:0;height:56px;background:#0f0f0f;display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:1000;border-bottom:1px solid #303030}
.hdr-l{display:flex;align-items:center;gap:16px}
.ham{background:none;border:none;color:#fff;cursor:pointer;padding:8px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.ham:hover{background:rgba(255,255,255,.1)}
.logo{display:flex;align-items:center;cursor:pointer;user-select:none}
.logo-p{width:32px;height:22px;background:#ff0000;border-radius:5px;display:flex;align-items:center;justify-content:center;margin-right:5px}
.logo-p::after{content:'';width:0;height:0;border-style:solid;border-width:5px 0 5px 9px;border-color:transparent transparent transparent #fff;margin-left:2px}
.logo-t{color:#fff;font-size:18px;font-weight:700;letter-spacing:-1px}
.logo-n{color:#aaa;font-size:10px;position:relative;top:-7px;margin-left:1px}

.hdr-c{display:flex;align-items:center;flex:1;max-width:640px;margin:0 40px}
.sbox{display:flex;flex:1}
.sbox input{flex:1;height:40px;background:#121212;border:1px solid #303030;border-right:none;border-radius:20px 0 0 20px;padding:0 16px;color:#fff;font-size:16px;outline:none}
.sbox input:focus{border-color:#1c62b9}
.sbox input::placeholder{color:#888}
.sbox button{width:64px;height:40px;background:#222;border:1px solid #303030;border-radius:0 20px 20px 0;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff}
.sbox button:hover{background:#333}

.hdr-r{display:flex;align-items:center;gap:8px}
.hb{background:none;border:none;color:#fff;cursor:pointer;padding:8px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.hb:hover{background:rgba(255,255,255,.1)}
.av-btn{width:32px;height:32px;border-radius:50%;background:#5a189a;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;cursor:pointer;border:none;color:#fff;overflow:hidden}
.av-btn img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.si-btn{display:flex;align-items:center;gap:8px;padding:6px 12px;border:1px solid #303030;border-radius:20px;background:transparent;color:#3ea6ff;font-size:14px;font-weight:500;cursor:pointer}
.si-btn:hover{background:rgba(62,166,255,.1)}
.si-btn svg{width:20px;height:20px}

.udd{position:absolute;top:48px;right:12px;background:#282828;border-radius:12px;padding:8px 0;min-width:260px;box-shadow:0 4px 32px rgba(0,0,0,.5);z-index:2000;display:none}
.udd.show{display:block}
.udd-h{display:flex;gap:12px;padding:16px;border-bottom:1px solid #3a3a3a}
.udd-av{width:40px;height:40px;border-radius:50%;overflow:hidden;flex-shrink:0;background:#5a189a;display:flex;align-items:center;justify-content:center;font-size:16px}
.udd-av img{width:100%;height:100%;object-fit:cover}
.udd-nf{display:flex;flex-direction:column;min-width:0}
.udd-nm{font-size:16px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.udd-em{font-size:13px;color:#aaa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.udd-i{display:flex;align-items:center;gap:16px;padding:10px 16px;cursor:pointer;font-size:14px}
.udd-i:hover{background:rgba(255,255,255,.1)}
.udd-i svg{width:24px;height:24px;flex-shrink:0}

.sb{position:fixed;top:56px;left:0;width:240px;height:calc(100vh - 56px);background:#0f0f0f;overflow-y:auto;padding:12px 0;z-index:999;border-right:1px solid rgba(255,255,255,.05);transition:transform .2s}
.sb.hid{transform:translateX(-240px)}
.sbi{display:flex;align-items:center;gap:24px;padding:0 12px;height:40px;cursor:pointer;border-radius:10px;margin:0 12px;font-size:14px}
.sbi:hover{background:rgba(255,255,255,.1)}
.sbi.act{background:rgba(255,255,255,.15);font-weight:500}
.sbi svg{width:24px;height:24px;flex-shrink:0}
.sb-d{height:1px;background:#303030;margin:12px 24px}

.mn{margin-left:240px;padding-top:56px;min-height:100vh;transition:margin-left .2s}
.mn.exp{margin-left:0}

.hm{padding:24px}
.chips{display:flex;gap:12px;padding-bottom:20px;overflow-x:auto;white-space:nowrap}
.chips::-webkit-scrollbar{display:none}
.chp{padding:6px 12px;background:rgba(255,255,255,.15);border:none;border-radius:8px;color:#fff;font-size:14px;cursor:pointer}
.chp:hover{background:rgba(255,255,255,.25)}
.chp.act{background:#fff;color:#0f0f0f}

.grd{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}

.crd{cursor:pointer;border-radius:12px;overflow:hidden;position:relative}
.crd:hover .tho{opacity:1}
.crd .cdel{position:absolute;top:8px;right:8px;z-index:10;background:rgba(0,0,0,.8);border:none;color:#ff4444;border-radius:50%;width:32px;height:32px;display:none;align-items:center;justify-content:center;cursor:pointer;font-size:16px}
.crd:hover .cdel{display:flex}

.thw{position:relative;width:100%;padding-top:56.25%;background:#1a1a1a;border-radius:12px;overflow:hidden}
.thw video,.thw img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
.tho{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
.dur{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.8);color:#fff;padding:2px 6px;border-radius:4px;font-size:12px;font-weight:500}
.cinf{display:flex;gap:12px;padding:12px 4px}
.cav{width:36px;height:36px;border-radius:50%;background:#333;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;overflow:hidden}
.cav img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.cmt{flex:1;min-width:0}
.ctl{font-size:14px;font-weight:500;line-height:20px;max-height:40px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:4px}
.cch{font-size:12px;color:#aaa}
.cst{font-size:12px;color:#aaa}

.thw .th-placeholder{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;background:#1a1a2e;font-size:48px}

.wv{display:none;padding:24px;max-width:1800px}
.wv.act{display:flex;gap:24px}
.wpr{flex:1;min-width:0}
.pw{position:relative;width:100%;padding-top:56.25%;background:#000;border-radius:12px;overflow:hidden}
.pw video{position:absolute;top:0;left:0;width:100%;height:100%;outline:none}
.pw .vld{position:absolute;top:0;left:0;right:0;bottom:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:5}
.pw .vld .sp{width:48px;height:48px;border-width:4px}
.pw .vld .lt{color:#aaa;margin-top:12px;font-size:14px}
.pw .vld .lb{width:80%;max-width:300px;height:4px;background:#333;border-radius:2px;margin-top:12px;overflow:hidden}
.pw .vld .lf{height:100%;background:#3ea6ff;border-radius:2px;transition:width .3s;width:0}

.wi{padding:12px 0}
.wtt{font-size:20px;font-weight:600;line-height:28px;margin-bottom:12px}
.wac{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px}
.wci{display:flex;align-items:center;gap:12px}
.wca{width:40px;height:40px;border-radius:50%;background:#333;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;overflow:hidden}
.wca img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.wctx{display:flex;flex-direction:column}
.wcn{font-size:16px;font-weight:500}
.wcs{font-size:12px;color:#aaa}
.subb{background:#fff;color:#0f0f0f;border:none;border-radius:20px;padding:10px 16px;font-size:14px;font-weight:600;cursor:pointer;margin-left:12px}
.subb:hover{background:#d9d9d9}

.ab{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.abt{display:flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(255,255,255,.1);border:none;border-radius:20px;color:#fff;font-size:14px;cursor:pointer;white-space:nowrap}
.abt:hover{background:rgba(255,255,255,.2)}
.lkb{border-radius:20px 0 0 20px;padding-right:12px;border-right:1px solid #555}
.dlb{border-radius:0 20px 20px 0;padding-left:12px}

.dbx{background:rgba(255,255,255,.1);border-radius:12px;padding:12px;margin-top:16px;cursor:pointer}
.dbs{font-size:14px;font-weight:500;margin-bottom:8px}
.dbt{font-size:14px;color:#ccc;line-height:20px;white-space:pre-wrap;max-height:60px;overflow:hidden;transition:max-height .3s}
.dbt.exp{max-height:none;overflow:visible}

.ws{width:402px;flex-shrink:0}
.rc{display:flex;gap:8px;margin-bottom:8px;cursor:pointer;border-radius:8px;padding:4px}
.rc:hover{background:rgba(255,255,255,.05)}
.rth{width:168px;height:94px;border-radius:8px;overflow:hidden;flex-shrink:0;background:#1a1a1a;position:relative}
.rth video,.rth img{width:100%;height:100%;object-fit:cover}
.ri{flex:1;min-width:0}
.rtl{font-size:14px;font-weight:500;line-height:20px;max-height:40px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:4px}
.rch{font-size:12px;color:#aaa}
.rst{font-size:12px;color:#aaa}

.mbg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:5000;display:none;align-items:center;justify-content:center}
.mbg.show{display:flex}
.mdl{background:#282828;border-radius:12px;width:90%;max-width:560px;max-height:90vh;display:flex;flex-direction:column}
.mdlh{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid #3a3a3a}
.mdlh h2{font-size:20px;font-weight:600}
.mdlx{background:none;border:none;color:#fff;font-size:24px;cursor:pointer;padding:4px 8px;border-radius:50%}
.mdlx:hover{background:rgba(255,255,255,.1)}
.mdlb{padding:24px;flex:1;overflow-y:auto}
.mdlf{padding:16px 24px;border-top:1px solid #3a3a3a;display:flex;gap:12px;justify-content:flex-end}

.merr{color:#ff4444;font-size:13px;margin-bottom:12px;padding:8px 12px;background:rgba(255,68,68,.1);border-radius:8px;display:none}
.mok{color:#4caf50;font-size:13px;margin-bottom:12px;padding:8px 12px;background:rgba(76,175,80,.1);border-radius:8px;display:none}

.tabs{display:flex;margin-bottom:20px;border-radius:8px;overflow:hidden;border:1px solid #303030}
.tab{flex:1;padding:10px;text-align:center;cursor:pointer;font-size:14px;font-weight:500;background:#1a1a1a;color:#aaa;border:none;transition:all .2s}
.tab.act{background:#3ea6ff;color:#000}
.tab:hover:not(.act){background:#252525}

.fdr{border:2px dashed #444;border-radius:12px;padding:40px 20px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:16px;position:relative}
.fdr:hover,.fdr.dov{border-color:#3ea6ff;background:rgba(62,166,255,.05)}
.fdr input[type=file]{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer}
.fdr-i{font-size:48px;margin-bottom:12px;display:block}
.fdr-t{font-size:16px;font-weight:500;margin-bottom:4px}
.fdr-h{font-size:12px;color:#888}

.fsl{display:none;padding:12px;background:#1a1a2e;border-radius:8px;margin-bottom:16px;border:1px solid #303060;align-items:center;gap:12px}
.fsl.show{display:flex}
.fsl-i{font-size:32px}
.fsl-d{flex:1;min-width:0}
.fsl-n{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fsl-s{font-size:12px;color:#aaa}
.fsl-r{background:none;border:none;color:#ff4444;cursor:pointer;font-size:20px;padding:4px 8px}

.fpr{width:100%;max-height:200px;border-radius:8px;margin-bottom:16px;display:none;background:#000}
.fpr.show{display:block}

.upr{display:none;margin-bottom:16px}
.upr.show{display:block}
.upr-b{width:100%;height:8px;background:#333;border-radius:4px;overflow:hidden}
.upr-f{height:100%;background:#3ea6ff;border-radius:4px;transition:width .2s;width:0}
.upr-t{font-size:12px;color:#aaa;margin-top:6px;text-align:center}
.upr-d{font-size:11px;color:#666;margin-top:2px;text-align:center}

.fg{margin-bottom:16px}
.fg label{display:block;font-size:13px;color:#aaa;margin-bottom:6px;font-weight:500}
.fg input,.fg textarea{width:100%;background:#121212;border:1px solid #303030;border-radius:8px;padding:10px 12px;color:#fff;font-size:14px;outline:none;font-family:inherit}
.fg input:focus,.fg textarea:focus{border-color:#3ea6ff}
.fg textarea{resize:vertical;min-height:80px}
.fg .hn{font-size:11px;color:#666;margin-top:4px}
.fg .cc{font-size:11px;color:#666;text-align:right;margin-top:2px}

.bc{padding:10px 20px;background:transparent;color:#fff;border:1px solid #555;border-radius:8px;font-size:14px;cursor:pointer}
.bc:hover{background:rgba(255,255,255,.1)}
.bs{padding:10px 24px;background:#3ea6ff;color:#0f0f0f;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px}
.bs:hover{background:#65b8ff}
.bs:disabled{background:#555;color:#999;cursor:not-allowed}

.sp{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#3ea6ff;border-radius:50%;animation:spin .6s linear infinite}
.sp.dk{border-color:rgba(0,0,0,.3);border-top-color:#000}
@keyframes spin{to{transform:rotate(360deg)}}

.pldr{display:flex;align-items:center;justify-content:center;padding:60px;flex-direction:column;gap:16px}
.pldr .sp{width:40px;height:40px;border-width:3px}

.tst{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:#fff;color:#0f0f0f;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:500;z-index:10000;transition:transform .3s;box-shadow:0 4px 12px rgba(0,0,0,.5);max-width:90vw;text-align:center}
.tst.show{transform:translateX(-50%) translateY(0)}

.ept{grid-column:1/-1;text-align:center;padding:80px 20px}
.ept svg{display:block;margin:0 auto 20px;opacity:.3}
.ept h3{font-size:22px;margin-bottom:8px;color:#aaa}
.ept p{font-size:14px;color:#666;margin-bottom:24px;line-height:22px}
.ept button{padding:12px 24px;background:#3ea6ff;color:#000;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer}
.ept button:hover{background:#65b8ff}

@media(max-width:1100px){.ws{display:none}}
@media(max-width:900px){.sb{transform:translateX(-240px)}.mn{margin-left:0!important}.hdr-c{margin:0 16px}}
@media(max-width:600px){.grd{grid-template-columns:1fr}.hdr-c{display:none}.ab{width:100%}.mdl{width:95%;max-width:none;margin:8px}}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-l">
    <button class="ham" onclick="togSB()"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg></button>
    <div class="logo" onclick="goHome()"><div class="logo-p"></div><span class="logo-t">YouTube</span><span class="logo-n">n't</span></div>
  </div>
  <div class="hdr-c">
    <div class="sbox">
      <input placeholder="Search" id="sIn" onkeyup="if(event.key==='Enter')doSearch()">
      <button onclick="doSearch()"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></button>
    </div>
  </div>
  <div class="hdr-r">
    <button class="hb" id="upHB" style="display:none" onclick="openMdl()" title="Upload"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M17 10.5V7a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h12a1 1 0 001-1v-3.5l4 4v-11l-4 4zM14 13h-3v3H9v-3H6v-2h3V8h2v3h3v2z"/></svg></button>
    <button class="si-btn" id="siB" onclick="signIn()"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2a7.2 7.2 0 01-6-3.22c.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08a7.2 7.2 0 01-6 3.22z"/></svg>Sign in</button>
    <button class="av-btn" id="avB" style="display:none" onclick="togDD()"></button>
  </div>
</header>

<div class="udd" id="uDD">
  <div class="udd-h"><div class="udd-av" id="ddA"></div><div class="udd-nf"><div class="udd-nm" id="ddN"></div><div class="udd-em" id="ddE"></div></div></div>
  <div class="udd-i" onclick="openMdl();togDD()"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 10.5V7a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h12a1 1 0 001-1v-3.5l4 4v-11l-4 4zM14 13h-3v3H9v-3H6v-2h3V8h2v3h3v2z"/></svg>Upload video</div>
  <div class="udd-i" onclick="myVids();togDD()"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12zM12 5.5v9l6-4.5z"/></svg>My videos</div>
  <div class="udd-i" onclick="doSignOut()"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4a2 2 0 00-2 2v14a2 2 0 002 2h8v-2H4V5z"/></svg>Sign out</div>
</div>

<nav class="sb" id="sb">
  <div class="sbi act" onclick="goHome()"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>Home</span></div>
  <div class="sb-d"></div>
  <div class="sbi" onclick="myVids()"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12zM12 5.5v9l6-4.5z"/></svg><span>Your videos</span></div>
</nav>

<div class="mbg" id="mdl">
  <div class="mdl">
    <div class="mdlh"><h2>Upload video</h2><button class="mdlx" onclick="closeMdl()">×</button></div>
    <div class="mdlb">
      <div class="merr" id="mE"></div>
      <div class="mok" id="mO"></div>
      <div class="tabs">
        <button class="tab act" onclick="swTab('file')">📁 From Device</button>
        <button class="tab" onclick="swTab('url')">🔗 From URL</button>
      </div>
      <div id="fTab">
        <div class="fdr" id="fDr">
          <input type="file" accept="video/*" id="fIn" onchange="onFile(event)">
          <span class="fdr-i">📤</span>
          <div class="fdr-t">Drag & drop or click to select</div>
          <div class="fdr-h">MP4, WebM, MOV — any size! Split into chunks automatically.</div>
        </div>
        <div class="fsl" id="fSl">
          <span class="fsl-i">🎬</span>
          <div class="fsl-d"><div class="fsl-n" id="fNm"></div><div class="fsl-s" id="fSz"></div></div>
          <button class="fsl-r" onclick="clrFile()">✕</button>
        </div>
        <video class="fpr" id="fPr" controls></video>
        <div class="upr" id="uPr">
          <div class="upr-b"><div class="upr-f" id="uFl"></div></div>
          <div class="upr-t" id="uTx">Processing...</div>
          <div class="upr-d" id="uDt"></div>
        </div>

async function getUrl(v){
  if(!v.chunked)return v.url;
  if(bc[v.id])return bc[v.id];
  const snap=await db.collection('videos').doc(v.id).collection('chunks').orderBy('index').get();
  if(snap.empty)return v.url;
  let b='';snap.forEach(d=>b+=d.data().data);
  const blob=b64Blob(b,v.mime);
  const u=URL.createObjectURL(blob);bc[v.id]=u;return u;
}

function b64Blob(b,ct){
  let r=b;if(r.startsWith('data:')){const p=r.split(',');if(p[0].includes('base64'))r=p[1];const m=p[0].match(/data:([^;]+)/);if(m)ct=m[1]}
  const bc=atob(r),ba=[];
  for(let o=0;o<bc.length;o+=512){const s=bc.slice(o,o+512),n=new Array(s.length);for(let i=0;i<s.length;i++)n[i]=s.charCodeAt(i);ba.push(new Uint8Array(n))}
  return new Blob(ba,{type:ct||'video/mp4'});
}

  sFile=f;$('fDr').style.display='none';$('fSl').classList.add('show');
  $('fNm').textContent=f.name;$('fSz').textContent=fB(f.size)+' — ~'+Math.ceil(f.size*1.37/CK)+' chunks';
  const pr=$('fPr'),ou=URL.createObjectURL(f);pr.src=ou;pr.classList.add('show');
  const ti=$('mTi');if(!ti.value){ti.value=f.name.replace(/\.[^/.]+$/,'').replace(/[_-]/g,' ');uCC(ti,'tC',200)}
  pr.addEventListener('loadedmetadata',()=>{const d=pr.duration;if(d&&isFinite(d)){const m=Math.floor(d/60),s=Math.floor(d%60);$('mDu').value=m+':'+String(s).padStart(2,'0')}},{once:true});

  const pg=$('uPr');pg.classList.add('show');$('uTx').textContent='Reading file...';$('uFl').style.width='0%';
  const rd=new FileReader();
  rd.onprogress=e=>{if(e.lengthComputable){const p=Math.round(e.loaded/e.total*100);$('uFl').style.width=p+'%';$('uTx').textContent='Reading... '+p+'%'}};

  rd.readAsDataURL(f);
}

function gR(d){if(d.startsWith('data:')){const i=d.indexOf(',');return d.substring(i+1)}return d}
function gM(d){if(d.startsWith('data:')){const m=d.match(/data:([^;]+)/);if(m)return m[1]}return'video/mp4'}

async function upURL(ti,de,du,url,th){
  await db.collection('videos').add({title:ti,url,thumbnail:th,channel:U.displayName||'Anonymous',description:de,duration:du,uid:U.uid,userDisplayName:U.displayName||'Anonymous',userPhotoURL:U.photoURL||'',views:0,likes:0,chunked:false,totalChunks:0,mimeType:'video/mp4',createdAt:firebase.firestore.FieldValue.serverTimestamp()});
}

async function upChunked(ti,de,du){
  const raw=gR(sB64),mime=gM(sB64),tc=Math.ceil(raw.length/CK);
  const pg=$('uPr');pg.classList.add('show');$('uTx').textContent='Creating video...';$('uFl').style.width='0%';

  const ref=await db.collection('videos').add({title:ti,url:'',thumbnail:'',channel:U.displayName||'Anonymous',description:de,duration:du,uid:U.uid,userDisplayName:U.displayName||'Anonymous',userPhotoURL:U.photoURL||'',views:0,likes:0,chunked:true,totalChunks:tc,mimeType:mime,createdAt:firebase.firestore.FieldValue.serverTimestamp()});

  for(let i=0;i<tc;i++){
    const s=i*CK,e=Math.min(s+CK,raw.length),ch=raw.substring(s,e);
    $('uTx').textContent=`Uploading chunk ${i+1}/${tc}...`;
    $('uDt').textContent=fB(s*0.75)+' / '+fB(raw.length*0.75);
    $('uFl').style.width=Math.round((i+1)/tc*100)+'%';
    await db.collection('videos').doc(ref.id).collection('chunks').doc(String(i).padStart(6,'0')).set({index:i,data:ch});
  }
  $('uTx').textContent='✓ Upload complete!';$('uFl').style.width='100%';$('uDt').textContent=tc+' chunks uploaded';
}

  document.querySelectorAll('.chp').forEach(c=>c.classList.remove('act'));
}

function myVids(){
  if(!U){msg('Sign in first');return}if(isW)goHome();
  const my=allV.filter(v=>v.uid===U.uid);
  $('vGr').innerHTML=my.length?my.map(crdH).join(''):'<div class="ept"><h3>No videos yet</h3><p>Upload your first video!</p><button onclick="openMdl()">Upload</button></div>';
  document.querySelectorAll('.chp').forEach(c=>c.classList.remove('act'));
}

// ══════ UI ══════
function doShare(){if(navigator.clipboard)navigator.clipboard.writeText(location.href).then(()=>msg('Link copied!'));else msg('Copy URL from bar')}
function togDe(){$('dT').classList.toggle('exp')}
function togSB(){sbOn=!sbOn;sbOn?($('sb').classList.remove('hid'),$('mnC').classList.remove('exp')):($('sb').classList.add('hid'),$('mnC').classList.add('exp'))}

document.querySelectorAll('.chp').forEach(c=>c.addEventListener('click',()=>{document.querySelectorAll('.chp').forEach(x=>x.classList.remove('act'));c.classList.add('act');render(c.dataset.f)}));
$('mdl').addEventListener('click',e=>{if(e.target===$('mdl'))closeMdl()});
$('pl').addEventListener('ended',()=>{if(curId&&allV.length>1){const i=allV.findIndex(v=>v.id===curId);watch(allV[(i+1)%allV.length].id)}});

function onRsz(){if(window.innerWidth<=900){$('sb').classList.add('hid');$('mnC').classList.add('exp');sbOn=false}}
window.addEventListener('resize',onRsz);onRsz();

// ══════ UTILS ══════
function $(id){return document.getElementById(id)}
function fV(n){return n>=1e6?(n/1e6).toFixed(1).replace(/\.0$/,'')+'M':n>=1e3?(n/1e3).toFixed(1).replace(/\.0$/,'')+'K':''+n}
function fL(n){return typeof n==='string'?n:fV(n)}
function fB(b){return b>=1e9?(b/1e9).toFixed(1)+'GB':b>=1e6?(b/1e6).toFixed(1)+'MB':b>=1e3?(b/1e3).toFixed(1)+'KB':b+'B'}
function tA(d){const s=Math.floor((Date.now()-d)/1e3);return s<60?'Just now':s<3600?Math.floor(s/60)+'m ago':s<86400?Math.floor(s/3600)+'h ago':s<2592e3?Math.floor(s/86400)+'d ago':s<31536e3?Math.floor(s/2592e3)+'mo ago':Math.floor(s/31536e3)+'y ago'}
function msg(m){const t=$('tst');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3000)}

// ══════ INIT ══════
subFB();
</script>
